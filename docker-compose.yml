services:
  sre-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sre-go-scratch
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    restart: unless-stopped
  
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro 
    depends_on:
      - sre-app
    restart: unless-stopped